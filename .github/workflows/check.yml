name: check-types & check

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "turbo.json"
      - ".oxlintrc.json"
      - ".oxfmtrc.json"
      - ".github/workflows/check.yml"
      - "!**/*.md"
      - "!**/*.mdx"
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "turbo.json"
      - ".oxlintrc.json"
      - ".oxfmtrc.json"
      - ".github/workflows/check.yml"
      - "!**/*.md"
      - "!**/*.mdx"

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Generate TanStack Router route tree
        run: bun run --cwd apps/web build
      - run: bun run check-types
      - run: bun run check
      - name: Verify no formatting changes
        run: git diff --exit-code
