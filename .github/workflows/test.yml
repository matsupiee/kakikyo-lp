name: test

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "turbo.json"
      - ".github/workflows/test.yml"
      - "!**/*.md"
      - "!**/*.mdx"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "turbo.json"
      - ".github/workflows/test.yml"
      - "!**/*.md"
      - "!**/*.mdx"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/web test
